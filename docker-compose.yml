version: '3.8'

services:
  gateway:
    build: .
    container_name: secure-api-gateway
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=supersecretkey_change_me_in_prod
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - RATE_LIMIT_PER_MINUTE=100
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
    restart: unless-stopped
